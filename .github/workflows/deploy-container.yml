name: Build and Deploy to Azure
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          build-args: |
            BUILD_ID=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/vue-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: appConteneur
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}
      
      - name: Create deployment summary
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App Service URL:** https://appConteneur.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "**Image Deployed:** \`${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build ID:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** sha, latest" >> $GITHUB_STEP_SUMMARY