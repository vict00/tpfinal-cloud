steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: |
      cd $(frontProjectPath)
      npm ci
    displayName: 'Install dependencies'

  - script: |
      cd $(frontProjectPath)
      npm run build
    env:
      VITE_BUILD_ID: $(Build.SourceVersion)
    displayName: 'Build project'

  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: '$(frontProjectPath)/dist'
      artifactName: 'front-dist'
      publishLocation: 'Container'
    displayName: 'Publish front-dist artifact'